services:
  sut:
    image: nimlang/nim:2.2.0
    stdin_open: true
    working_dir: /usr/src/app
    tty: true
    command: >
      sh -c "git config --global --add safe.directory /usr/src/app
      && apt-get update -qq
      && apt-get install -y -qq libcurl4-openssl-dev
      && sleep 5
      && nimble integration -y"
    volumes:
      - ../:/usr/src/app
    depends_on:
      - webdav

  webdav:
    image: bytemark/webdav
    environment:
      - AUTH_TYPE=Basic
      - USERNAME=admin
      - PASSWORD=password
